name: Release

# Build, sign, notarize, and publish the macOS desktop app on a version tag.
# Push a tag like `v0.1.0` (or run manually) to cut a draft GitHub Release with
# the signed .dmg + the Tauri updater artifacts (latest.json + signature).
#
# Matrix over both macOS arches: the bundled runtime (CPython + uv) is per-arch,
# so we build an Apple-silicon and an Intel app separately and publish both to the
# same release. tauri-action merges the per-target updater entries.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14 # Apple silicon
            rust_target: aarch64-apple-darwin
          - runner: macos-13 # Intel
            rust_target: x86_64-apple-darwin
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install frontend deps
        run: npm ci

      - name: Fetch bundled runtime (CPython + uv + daemon wheel)
        run: ./scripts/fetch-runtime.sh # fetches the runner's arch

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # --- App-shell updater signing (generate with `npm run tauri signer generate`).
          #     The corresponding PUBLIC key goes in src-tauri/tauri.conf.json (plugins.updater.pubkey).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # --- Apple Developer ID signing + notarization.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Hyperspell ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.rust_target }}
