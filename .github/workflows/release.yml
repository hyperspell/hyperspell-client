name: Release

# Build, sign, notarize, and publish the macOS desktop app on a version tag.
# Push a tag like `v0.1.0` (or run manually) to cut a draft GitHub Release with
# the signed .dmg + the Tauri updater artifacts (latest.json + signature).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          # Universal binary needs both arches.
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install frontend deps
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # --- App-shell updater signing (generate with `npm run tauri signer generate`).
          #     The corresponding PUBLIC key goes in src-tauri/tauri.conf.json (plugins.updater.pubkey).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # --- Apple Developer ID signing + notarization.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Hyperspell ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          args: --target universal-apple-darwin
